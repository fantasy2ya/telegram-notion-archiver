name: Deploy to Google Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        env:
          REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
        run: |
          python3 -c "
          import json, os
          data = {'tokens': {'default': {
            'client_id': os.environ['CLIENT_ID'],
            'client_secret': os.environ['CLIENT_SECRET'],
            'type': 'authorized_user',
            'refresh_token': os.environ['REFRESH_TOKEN']
          }}}
          with open(os.path.expanduser('~/.clasprc.json'), 'w') as f:
            json.dump(data, f)
          "

      - name: Create .clasp.json
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: printf '{"scriptId":"%s","rootDir":""}' "$SCRIPT_ID" > .clasp.json

      - name: Push to GAS
        run: clasp push --force
